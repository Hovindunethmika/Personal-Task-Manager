schemaVersion: 1.0.0

metadata:
  name: task-manager-backend
  displayName: "Task Manager Backend"
  description: "Go-based REST API for task management"
  labels:
    - type:backend
    - language:go

source:
  type: dockerfile
  path: ./Dockerfile

port: 8080

environment:
  - name: PORT
    value: "8080"
  - name: GIN_MODE
    value: release
  - name: DB_PATH
    value: /app/data/tasks.db
  - name: ALLOWED_ORIGINS
    value: "*"

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m

replicas:
  min: 1
  max: 3

healthCheck:
  enabled: true
  path: /health
  protocol: http
  interval: 30
  timeout: 5
  retries: 3
  startPeriod: 10

ingress:
  enabled: true
  cors:
    enabled: true
    allowCredentials: false
    allowOrigins:
      - "*"
    allowMethods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowHeaders:
      - Content-Type
      - Authorization
