version: '3.8'

services:
  backend:
    build:
      context: ./task-manager
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      GIN_MODE: debug
      DB_PATH: /app/data/tasks.db
    volumes:
      - ./task-manager/data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./task-manager-frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8080
    depends_on:
      - backend
    stdin_open: true
    tty: true

volumes:
  db_data:
